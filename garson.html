<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATOM · Garson Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:'Figtree',sans-serif;min-height:100vh;
  padding:24px 20px 100px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.045'/%3E%3C/svg%3E");
  background-size:200px;opacity:.5;mix-blend-mode:overlay}

.header{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo{font-family:'Cormorant Garamond';font-size:22px;font-weight:600}
.logo span{color:#E8390E}
.role-badge{background:rgba(232,57,14,.12);border:1px solid rgba(232,57,14,.3);
  border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;
  color:#E8390E;letter-spacing:1px;text-transform:uppercase}

.status-bar{position:relative;z-index:1;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 20px;
  margin-bottom:24px;display:flex;align-items:center;gap:12px}
.status-dot{width:10px;height:10px;border-radius:50%;background:#4ADE80;
  box-shadow:0 0 0 3px rgba(74,222,128,.2);flex-shrink:0}
.status-dot.offline{background:#666;box-shadow:none}
.status-dot.pending{background:#FBBF24;box-shadow:0 0 0 3px rgba(251,191,36,.2)}
.status-txt{font-size:13px;font-weight:500}
.status-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.status-action{margin-left:auto;background:#E8390E;border:none;border-radius:10px;
  padding:8px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Figtree';transition:all .2s}
.status-action:hover{background:#ff4d1a}

.section-title{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,.3);margin-bottom:14px;position:relative;z-index:1;
  display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}

/* Bildirim kartları */
.notif-list{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.notif-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;
  animation:slideIn .3s ease}
.notif-card.garson{border-color:rgba(232,57,14,.3);background:rgba(232,57,14,.06)}
.notif-card.hazir{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.06)}
.notif-card.sikayet{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.06)}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.notif-ico{font-size:24px;flex-shrink:0}
.notif-body{flex:1}
.notif-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.notif-desc{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5}
.notif-time{font-size:10px;color:rgba(255,255,255,.25);margin-top:5px}
.notif-close{background:rgba(255,255,255,.08);border:none;border-radius:8px;
  width:28px;height:28px;color:rgba(255,255,255,.4);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.notif-close:hover{background:rgba(255,255,255,.15);color:#fff}
.notif-empty{text-align:center;padding:32px;color:rgba(255,255,255,.2);font-size:13px}

/* Mutfak gönder bölümü */
.mutfak-card{position:relative;z-index:1;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px;margin-bottom:28px}
.masa-input-wrap{display:flex;gap:10px;margin-bottom:14px}
.masa-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:12px 16px;color:#fff;font-size:16px;font-family:'Figtree';
  font-weight:600;text-align:center;outline:none;transition:border .2s}
.masa-input:focus{border-color:rgba(232,57,14,.5)}
.masa-input::placeholder{color:rgba(255,255,255,.2);font-weight:400}
.send-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.send-btn{padding:14px;border-radius:13px;border:none;font-family:'Figtree';
  font-size:13px;font-weight:700;cursor:pointer;transition:all .22s;
  display:flex;align-items:center;justify-content:center;gap:7px}
.send-btn-hazir{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);color:#4ADE80}
.send-btn-hazir:hover{background:#4ADE80;color:#111}
.send-btn-garson{background:rgba(232,57,14,.15);border:1px solid rgba(232,57,14,.3);color:#E8390E}
.send-btn-garson:hover{background:#E8390E;color:#fff}

/* Ses butonu */
.sound-toggle{position:fixed;bottom:24px;right:20px;z-index:100;
  width:52px;height:52px;border-radius:50%;background:#111;
  border:1px solid rgba(255,255,255,.15);color:#fff;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s}
.sound-toggle:hover{background:#1a1a1a;border-color:rgba(255,255,255,.3)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  z-index:9999;background:#0e0e0e;border:1px solid rgba(255,255,255,.15);
  border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:10px;
  opacity:0;transition:all .35s cubic-bezier(.16,1,.3,1);white-space:nowrap;
  pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-txt{font-size:13px;font-weight:600}
</style>
</head>
<body>

<div class="header">
  <div class="logo">AT<span>O</span>M</div>
  <div class="role-badge">🧑‍🍽️ Garson Paneli</div>
</div>

<!-- Bildirim Durumu -->
<div class="status-bar" id="statusBar">
  <div class="status-dot pending" id="statusDot"></div>
  <div>
    <div class="status-txt" id="statusTxt">Bildirimler bağlanıyor...</div>
    <div class="status-sub" id="statusSub">Lütfen izin verin</div>
  </div>
  <button class="status-action" id="statusBtn" onclick="activateNotif()">Aktif Et</button>
</div>

<!-- Gelen Bildirimler -->
<div class="section-title">Gelen Bildirimler</div>
<div class="notif-list" id="notifList">
  <div class="notif-empty" id="notifEmpty">Henüz bildirim yok</div>
</div>

<!-- Mutfaktan Gönder -->
<div class="section-title">Bildirim Gönder</div>
<div class="mutfak-card">
  <div class="masa-input-wrap">
    <input class="masa-input" type="number" id="masaNo" placeholder="Masa No" min="1" max="99">
  </div>
  <div class="send-grid">
    <button class="send-btn send-btn-hazir" onclick="sendHazir()">✅ Sipariş Hazır</button>
    <button class="send-btn send-btn-garson" onclick="sendGarson()">🔔 Garson Çağır</button>
  </div>
</div>

<button class="sound-toggle" id="soundBtn" onclick="toggleSound()" title="Ses">🔔</button>

<div class="toast" id="toast"><span id="toastTxt"></span></div>

<script>
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyCpvX-GTUDY_VdsTBb84qpXG8vaE9KCU4I",
  authDomain: "atom-kumpir.firebaseapp.com",
  projectId: "atom-kumpir",
  storageBucket: "atom-kumpir.firebasestorage.app",
  messagingSenderId: "501395694480",
  appId: "1:501395694480:web:8bf847d1380740bdeb0915"
};
var VAPID_KEY = "BADYX6Tdx1n_URAPrHDxSi5agSCz56gWVhK3SyU7mCmXCcUzYirHKavvzl5gMOhWtRLi0yhghvpTjeSUDXSjECU";
var GARSON_WA = "905359777275";

var messaging = null;
var soundOn = true;
var notifications = [];

// Firebase init
firebase.initializeApp(FIREBASE_CONFIG);

function activateNotif() {
  Notification.requestPermission().then(function(perm) {
    if (perm === 'granted') {
      initMessaging();
    } else {
      setStatus('offline', 'Bildirim izni reddedildi', 'Ayarlardan açabilirsiniz');
    }
  });
}

function initMessaging() {
  messaging = firebase.messaging();
  navigator.serviceWorker.register('/firebase-messaging-sw.js').then(function(reg) {
    return messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
  }).then(function(token) {
    if (token) {
      localStorage.setItem('atom_garson_token', token);
      setStatus('online', 'Bildirimler Aktif ✓', 'Token kaydedildi');
      document.getElementById('statusBtn').style.display = 'none';
      showToast('✓ Bildirimler aktif');
    }
  }).catch(function(e) {
    setStatus('offline', 'Bağlantı hatası', e.message);
  });

  // Ön planda bildirim
  messaging.onMessage(function(payload) {
    var d = payload.data || {};
    var n = payload.notification || {};
    addNotification(d.type || 'garson', n.title || '🔔', n.body || '', d.masa || '?');
    if (soundOn) playBeep(d.type);
  });
}

function setStatus(state, txt, sub) {
  var dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + state;
  document.getElementById('statusTxt').textContent = txt;
  document.getElementById('statusSub').textContent = sub;
}

function addNotification(type, title, desc, masa) {
  var id = Date.now();
  notifications.unshift({ id, type, title, desc, masa, time: new Date() });
  renderNotifications();
}

function renderNotifications() {
  var list = document.getElementById('notifList');
  var empty = document.getElementById('notifEmpty');
  if (notifications.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  var icons = { garson: '🔔', hazir: '✅', sikayet: '⚠️' };
  list.innerHTML = '<div class="notif-empty" id="notifEmpty" style="display:none"></div>' +
    notifications.slice(0, 20).map(function(n) {
      var t = n.time;
      var timeStr = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
      return '<div class="notif-card ' + n.type + '" id="n'+n.id+'">' +
        '<span class="notif-ico">' + (icons[n.type]||'📌') + '</span>' +
        '<div class="notif-body">' +
          '<div class="notif-title">' + n.title + '</div>' +
          '<div class="notif-desc">' + n.desc + '</div>' +
          '<div class="notif-time">Masa ' + n.masa + ' · ' + timeStr + '</div>' +
        '</div>' +
        '<button class="notif-close" onclick="removeNotif(' + n.id + ')">✕</button>' +
      '</div>';
    }).join('');
}

function removeNotif(id) {
  notifications = notifications.filter(function(n){ return n.id !== id; });
  renderNotifications();
}

function sendHazir() {
  var masa = document.getElementById('masaNo').value;
  if (!masa) { showToast('⚠️ Masa numarası girin'); return; }
  // Bu normalde Firestore'a yazılır, diğer cihazlar okur
  // Şimdilik localStorage broadcast simülasyonu
  var ev = { type: 'hazir', masa: masa, time: Date.now() };
  localStorage.setItem('atom_broadcast', JSON.stringify(ev));
  addNotification('hazir', '📦 Sipariş Hazır', 'Masa ' + masa + ' siparişi servise hazır.', masa);
  if (soundOn) playBeep('hazir');
  showToast('✅ Masa ' + masa + ' · Sipariş hazır bildirimi gönderildi');
  document.getElementById('masaNo').value = '';
}

function sendGarson() {
  var masa = document.getElementById('masaNo').value;
  if (!masa) { showToast('⚠️ Masa numarası girin'); return; }
  var ev = { type: 'garson', masa: masa, time: Date.now() };
  localStorage.setItem('atom_broadcast', JSON.stringify(ev));
  addNotification('garson', '🔔 Garson Çağrısı', 'Masa ' + masa + ' garson istiyor.', masa);
  if (soundOn) playBeep('garson');
  showToast('🔔 Masa ' + masa + ' · Garson çağrısı gönderildi');
  document.getElementById('masaNo').value = '';
}

function playBeep(type) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var freqs = { garson: [880, 1100], hazir: [660, 880, 1100], sikayet: [440, 330] };
    var seq = freqs[type] || [880];
    seq.forEach(function(freq, i) {
      setTimeout(function() {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      }, i * 200);
    });
  } catch(e) {}
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔔' : '🔕';
  showToast(soundOn ? '🔔 Ses açık' : '🔕 Ses kapalı');
}

function showToast(txt) {
  var t = document.getElementById('toast');
  document.getElementById('toastTxt').textContent = txt;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

// localStorage broadcast dinle (aynı cihazdaki sekmeler arası)
window.addEventListener('storage', function(e) {
  if (e.key === 'atom_broadcast' && e.newValue) {
    try {
      var ev = JSON.parse(e.newValue);
      var titles = { garson: '🔔 Garson Çağrısı', hazir: '📦 Sipariş Hazır', sikayet: '⚠️ Şikayet' };
      var descs = {
        garson: 'Masa ' + ev.masa + ' garson istiyor.',
        hazir: 'Masa ' + ev.masa + ' siparişi servise hazır.',
        sikayet: 'Masa ' + ev.masa + ' şikayet bildirdi.'
      };
      addNotification(ev.type, titles[ev.type]||'📌', descs[ev.type]||'', ev.masa||'?');
      if (soundOn) playBeep(ev.type);
    } catch(e) {}
  }
});

// Sayfa açılınca otomatik izin iste
if (Notification.permission === 'granted') {
  initMessaging();
  document.getElementById('statusBtn').style.display = 'none';
} else if (Notification.permission === 'denied') {
  setStatus('offline', 'Bildirim izni kapalı', 'Tarayıcı ayarlarından açın');
}
</script>
</body>
</html>
