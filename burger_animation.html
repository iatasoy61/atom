<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Burger Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF8F00;
            --secondary: #2C2C2C;
            --background: #F9F9F9;
            --text-dark: #1A1A1A;
            --text-light: #7A7A7A;
            --white: #FFFFFF;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 40px;
            box-shadow: 0 20px 50px var(--shadow);
            padding: 30px 20px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* AppBar */
        .app-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .icon-btn {
            background: var(--background);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .icon-btn:hover {
            background: #EAEAEA;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0;
        }

        /* Selectors */
        .selectors {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }
        .selector-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .selector-label {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
            margin-left: 5px;
        }
        .options {
            display: flex;
            background: var(--background);
            border-radius: 30px;
            padding: 5px;
        }
        .option-btn {
            padding: 10px 18px;
            border-radius: 25px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-btn.active {
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(255, 143, 0, 0.4);
        }
        .option-btn.active-dark {
            background: var(--secondary);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(44, 44, 44, 0.4);
        }

        /* Burger Presentation */
        .burger-display {
            position: relative;
            height: 340px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            perspective: 1000px;
        }

        .layer {
            position: absolute;
            width: 250px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            justify-content: center;
                pointer-events: none;
        }
        
        .layer img {
            width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15));
        }

        /* Layer Specifics (Starting positions for S) */
        #top-bun {
            top: 80px;
            z-index: 5;
        }
        #top-bun img {
            transition: transform 0.4s ease, opacity 0.3s ease;
        }
        #tomato-patty {
            top: 140px;
            z-index: 4;
        }
        #medium-patty {
            top: 160px;
            z-index: 3;
            opacity: 0;
            transform: translateX(-50%) scale(0.8) translateY(-30px);
        }
        #large-patty {
            top: 180px;
            z-index: 2;
            opacity: 0;
            transform: translateX(-50%) scale(0.8) translateY(-30px);
        }
        #bottom-bun {
            top: 210px;
            z-index: 1;
        }
        #bottom-bun img {
            transition: transform 0.4s ease, opacity 0.3s ease;
        }

        /* Animation Classes */
        .bounce-in {
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        .bounce-out {
            animation: bounceOut 0.4s ease-in forwards;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(-50px); }
            60% { opacity: 1; transform: translateX(-50%) scale(1.05) translateY(10px); }
            100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
        }
        @keyframes bounceOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(20px); }
        }

        /* Bottom Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        /* Quantity */
        .quantity-selector {
            display: flex;
            align-items: center;
            background: var(--background);
            border-radius: 30px;
            padding: 5px 15px;
        }
        .qty-btn {
            background: var(--white);
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--shadow);
            color: var(--text-dark);
            transition: all 0.2s;
        }
        .qty-btn:hover {
            transform: scale(1.1);
        }
        .qty-value {
            font-size: 18px;
            font-weight: 600;
            margin: 0 20px;
            color: var(--text-dark);
        }

        /* Price */
        .price {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Add to Cart */
        .add-to-cart {
            width: 100%;
            background: var(--secondary);
            color: var(--white);
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(44, 44, 44, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .add-to-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(44, 44, 44, 0.4);
        }
        .add-to-cart:active {
            transform: translateY(1px);
        }
        
    </style>
</head>
<body>

    <div class="app-container">
        <!-- App Bar -->
        <div class="app-bar">
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <h1 class="title">Cheeseburger</h1>
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
        </div>

        <!-- Selectors -->
        <div class="selectors">
            <div class="selector-group">
                <span class="selector-label">Size</span>
                <div class="options">
                    <button class="option-btn active" onclick="setSize('S', this)">S</button>
                    <button class="option-btn" onclick="setSize('M', this)">M</button>
                    <button class="option-btn" onclick="setSize('L', this)">L</button>
                </div>
            </div>
            
            <div class="selector-group">
                <span class="selector-label">Bun Type</span>
                <div class="options">
                    <button class="option-btn active" onclick="setType('white', this)">White</button>
                    <button class="option-btn" onclick="setType('black', this)">Black</button>
                </div>
            </div>
        </div>

        <!-- Burger Animation Area -->
        <div class="burger-display" id="burger-display">
            <!-- Layers (from top to bottom visually) -->
            <div class="layer" id="top-bun">
                <img src="assets/images_burger/white_bun_top.png" alt="Top Bun" id="top-bun-img">
            </div>
            
            <div class="layer" id="tomato-patty">
                <img src="assets/images_burger/tomato_with_patty.png" alt="Tomato and Patty">
            </div>
            
            <div class="layer" id="medium-patty">
                <img src="assets/images_burger/patty_left.png" alt="Medium Patty">
            </div>
            
            <div class="layer" id="large-patty">
                <img src="assets/images_burger/patty_right.png" alt="Large Patty">
            </div>
            
            <div class="layer" id="bottom-bun">
                <img src="assets/images_burger/white_bun_bottom.png" alt="Bottom Bun" id="bottom-bun-img">
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="quantity-selector">
                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                <span class="qty-value" id="qty">1</span>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>
            <div class="price" id="price">$10.40</div>
        </div>

        <button class="add-to-cart">Add to cart</button>
    </div>

    <script>
        let currentSize = 'S';
        let currentType = 'white';
        let qty = 1;
        const basePrice = 10.40;
        
        // DOM Elements
        const topBun = document.getElementById('top-bun');
        const tomatoPatty = document.getElementById('tomato-patty');
        const medPatty = document.getElementById('medium-patty');
        const largePatty = document.getElementById('large-patty');
        const bottomBun = document.getElementById('bottom-bun');
        
        const topBunImg = document.getElementById('top-bun-img');
        const bottomBunImg = document.getElementById('bottom-bun-img');

        // Y offsets for layers in different sizes based on logic
        const layout = {
            'S': { topBun: 80, tomatoPatty: 140, bottomBun: 210 },
            'M': { topBun: 50, tomatoPatty: 110, medPatty: 160, bottomBun: 230 },
            'L': { topBun: 20, tomatoPatty: 80,  medPatty: 130, largePatty: 180, bottomBun: 260 }
        };

        function setSize(size, btn) {
            if (currentSize === size && btn !== null) return;
            currentSize = size;
            
            // Update active state
            if (btn) {
                document.querySelectorAll('.selectors .selector-group:first-child .option-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            // Apply new positions
            const pos = layout[size];
            topBun.style.top = pos.topBun + 'px';
            tomatoPatty.style.top = pos.tomatoPatty + 'px';
            bottomBun.style.top = pos.bottomBun + 'px';

            // Handle Medium Patty animation
            medPatty.style.top = (pos.medPatty || 160) + 'px';
            if (size === 'M' || size === 'L') {
                medPatty.classList.remove('bounce-out');
                medPatty.classList.add('bounce-in');
            } else {
                if(medPatty.classList.contains('bounce-in')) {
                    medPatty.classList.remove('bounce-in');
                    medPatty.classList.add('bounce-out');
                }
            }

            // Handle Large Patty animation
            largePatty.style.top = (pos.largePatty || 180) + 'px';
            if (size === 'L') {
                largePatty.classList.remove('bounce-out');
                setTimeout(() => largePatty.classList.add('bounce-in'), 150);
            } else {
                if(largePatty.classList.contains('bounce-in')) {
                    largePatty.classList.remove('bounce-in');
                    largePatty.classList.add('bounce-out');
                }
            }

            updatePrice();
        }

        function setType(type, btn) {
            if (currentType === type) return;
            currentType = type;
            
            // Update active state
            const group = btn.parentElement;
            group.querySelectorAll('.option-btn').forEach(b => {
                b.classList.remove('active', 'active-dark');
            });
            btn.classList.add(type === 'black' ? 'active-dark' : 'active');

            // Animate Bun Change
            topBunImg.style.transform = 'rotate(-15deg) translateY(-30px)';
            topBunImg.style.opacity = '0';
            bottomBunImg.style.transform = 'rotate(15deg) translateY(30px)';
            bottomBunImg.style.opacity = '0';
            
            setTimeout(() => {
                topBunImg.src = `assets/images_burger/${type}_bun_top.png`;
                bottomBunImg.src = `assets/images_burger/${type}_bun_bottom.png`;
                
                topBunImg.style.transform = 'rotate(0deg) translateY(0)';
                topBunImg.style.opacity = '1';
                bottomBunImg.style.transform = 'rotate(0deg) translateY(0)';
                bottomBunImg.style.opacity = '1';
            }, 300);
        }

        function updateQty(change) {
            if (qty + change > 0 && qty + change <= 10) {
                qty += change;
                document.getElementById('qty').innerText = qty;
                updatePrice();
            }
        }

        function updatePrice() {
            let multiplier = currentSize === 'S' ? 1 : currentSize === 'M' ? 1.4 : 1.8;
            let total = (basePrice * multiplier * qty).toFixed(2);
            document.getElementById('price').innerText = '$' + total;
        }

        // Initialize positions
        setSize('S', null);
    </script>
</body>
</html>
